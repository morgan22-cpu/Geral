<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jornada Romântica ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', 'Dancing Script', cursive, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #2b0b2a 0%, #1a0520 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Container principal que será trocado via JS */
        .page-container {
            width: 100%;
            max-width: 650px;
            background: rgba(255, 245, 250, 0.92);
            backdrop-filter: blur(12px);
            border-radius: 56px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.3), 0 0 0 2px rgba(255, 200, 220, 0.6) inset;
            overflow: hidden;
            transition: all 0.4s ease;
            z-index: 10;
            border: 1px solid rgba(255, 215, 215, 0.8);
        }

        .card {
            padding: 2.2rem 1.8rem;
            text-align: center;
        }

        h2 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            color: #c72a6f;
            text-shadow: 2px 2px 8px #ffb7c5;
            margin-bottom: 1rem;
        }

        .romantic-phrase {
            font-size: 1.5rem;
            font-weight: 500;
            color: #a52a5e;
            background: rgba(255, 240, 245, 0.7);
            padding: 15px;
            border-radius: 50px;
            margin: 20px 0;
            font-style: italic;
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.1);
        }

        /* Área de senha */
        .password-area {
            background: #fff0f5dd;
            padding: 20px;
            border-radius: 48px;
            margin: 20px 0;
            box-shadow: 0 5px 15px rgba(199, 42, 111, 0.2);
        }

        .password-input {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 15px 0;
        }

        input {
            padding: 12px 18px;
            font-size: 1.2rem;
            border: 2px solid #ff99bb;
            border-radius: 60px;
            outline: none;
            text-align: center;
            background: white;
            transition: 0.2s;
            font-weight: bold;
        }

        input:focus {
            border-color: #c72a6f;
            box-shadow: 0 0 10px #ff69b4;
        }

        .digit-group {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .digit-group input {
            width: 70px;
            text-align: center;
            font-size: 1.6rem;
        }

        button {
            background: linear-gradient(135deg, #ff758c, #ff4d6d);
            border: none;
            padding: 12px 32px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
            box-shadow: 0 5px 12px #c72a6f60;
        }

        button:hover {
            transform: scale(1.02);
            background: linear-gradient(135deg, #ff5f7c, #ff3357);
            box-shadow: 0 8px 18px #b11d55;
        }

        .error-msg {
            color: #e63946;
            font-weight: bold;
            margin-top: 10px;
            background: #fff0f0;
            padding: 6px;
            border-radius: 30px;
            font-size: 0.9rem;
        }

        /* botões sim / não */
        .choice-buttons {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin: 20px 0;
        }

        .choice-buttons button {
            padding: 12px 30px;
            font-size: 1.5rem;
            min-width: 120px;
        }

        .no-btn {
            background: #6c757d;
        }

        .no-btn:hover {
            background: #495057;
        }

        /* elementos flutuantes */
        .floating-media {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .flower,
        .photo {
            position: absolute;
            animation: floatAround 18s infinite ease-in-out;
            filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.2));
            opacity: 0.7;
        }

        .flower {
            font-size: 2.2rem;
        }

        .photo {
            /* tamanho controlado diretamente no elemento img */
            filter: drop-shadow(0 0 4px gold);
        }

        .photo img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 0 12px rgba(255, 105, 180, 0.6);
            display: block;
        }

        @keyframes floatAround {
            0% {
                transform: translateY(0vh) translateX(0) rotate(0deg);
                opacity: 0.5;
            }

            50% {
                transform: translateY(-20vh) translateX(20px) rotate(8deg);
                opacity: 0.9;
            }

            100% {
                transform: translateY(0vh) translateX(0) rotate(0deg);
                opacity: 0.5;
            }
        }

        /* fogos de artifício canvas */
        #fireworks-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* ajustes para responsividade */
        @media (max-width: 550px) {
            .card {
                padding: 1.5rem;
            }

            .romantic-phrase {
                font-size: 1.2rem;
            }

            h2 {
                font-size: 1.8rem;
            }

            .digit-group input {
                width: 55px;
                font-size: 1.3rem;
            }

            .photo img {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>

<body>

    <canvas id="fireworks-canvas"></canvas>
    <div class="floating-media" id="floating-elements"></div>

    <div id="app-root" class="page-container">
        <!-- conteúdo será gerado dinamicamente -->
    </div>

    <script>
        // ========= CONFIGURAÇÕES DAS SENHAS E PÁGINAS ==========
        const PAGES = {
            1: {
                senhaVerifier: (input) => input === "2005/06/17",
                placeholder: "aaaa/mm/dd",
                hint: "Data especial",
                title: "🌹 Primeiro Selo 🌹",
                phrase: "Te conheci num momento dificil da sua vida o mais engrasado comecei a gostar de te e agora so quero ter você do meu lado.! 💖",
                needsInput: true
            },
            2: {
                senhaVerifier: (input) => input === "1705",
                placeholder: "4 números",
                hint: "Qual é a combinação secreta? ",
                title: "🔐 Cadeado do Coração 🔐",
                phrase: "Combinamos como os números certos, você completa meu código secreto. ❤️",
                needsInput: true,
                isNumericCode: true
            },
            3: {
                senhaVerifier: (input) => input === "Preto",
                placeholder: "Digite a cor",
                hint: "Qual é a meu cor favorita?",
                title: "🎨 A cor que brilha de baixo de sol 🎨",
                phrase: "Como a noite estrelada, o preto é a cor da elegância e do mistério… e também a sua favorita. ✨",
                needsInput: true
            },
            4: {
                senhaVerifier: (input) => input === "My Black Favorite",
                placeholder: "Resultado",
                hint: "Descubra",
                title: "💞 Calculadora de Nomes 💞",
                phrase: "Nome que esta guardado no seu celular . A fórmula mais linda do universo! 🌌",
                needsInput: true
            },
            5: {
                // página de pedido, lógica diferente (Sim/Não)
                title: "💍 O Grande Momento 💍",
                phrase: "Cada passo te trouxe até aqui. Meu coração bate só por você...",
                needsInput: false,
                isProposal: true
            },
            6: { // página final após SIM
                title: "✨ SIM! ✨",
                phrase: "Você escolheu loucura ao meu lado e agora vamos enfremtar o mundo pra ficarmos juntos pra sempre! ❤️🌹 Nosso amor será um prova de fogo!",
                final: true
            },
            rejected: {
                title: "💔 Que pena... 💔",
                phrase: "O amor espera... quem sabe um dia? Meu coração continua aqui, aberto pra você. 🌹",
            }
        };

        let currentPage = 1;
        let rejectedFlag = false;

        // Lista de fotos reais (substitua pelos seus arquivos)
        const minhasFotos = [
            'img/tucha1.jpeg',
            'img/tucha2.jpeg',
            'img/tucha3.jpeg',
            'img/tucha4.jpeg',
            'img/tucha5.jpeg',
            'img/tucha6.jpeg',
            'img/tucha7.jpeg',
            'img/tucha8.jpeg',
            //'img/tucha9.jpeg',
            //'img/tucha10.jpeg'
        ];

        // Emojis para as flores
        const flowerEmojis = ['🌸', '🌹', '🌺', '🌷', '💐', '🌼', '🌻', '🪷', '❤️', '💖', '💗'];

        // Função para gerar flores (emoji) e fotos reais flutuantes
        function generateFloatingElements() {
            const container = document.getElementById('floating-elements');
            if (!container) return;
            container.innerHTML = ''; // limpa antes de recriar

            const totalElements = 38; // quantidade de elementos flutuantes (flores + fotos)
            for (let i = 0; i < totalElements; i++) {
                // Decide se será uma foto real ou uma flor (emoji)
                const isPhoto = Math.random() < 0.4; // 40% de chance de ser foto real, 60% flor

                let element;
                if (isPhoto && minhasFotos.length > 0) {
                    // Cria um elemento de foto com imagem real
                    element = document.createElement('div');
                    element.className = 'photo';
                    const img = document.createElement('img');
                    // Escolhe uma foto aleatória do array
                    const randomPhoto = minhasFotos[Math.floor(Math.random() * minhasFotos.length)];
                    img.src = randomPhoto;
                    img.alt = 'Foto especial';
                    element.appendChild(img);
                } else {
                    // Cria uma flor com emoji
                    element = document.createElement('div');
                    element.className = 'flower';
                    const randomEmoji = flowerEmojis[Math.floor(Math.random() * flowerEmojis.length)];
                    element.textContent = randomEmoji;
                }

                // Estilos comuns de posição e animação
                const size = Math.random() * 1.5 + 1.0;
                if (!isPhoto) element.style.fontSize = `${size}rem`;
                element.style.left = `${Math.random() * 100}%`;
                element.style.top = `${Math.random() * 100}%`;
                const duration = 12 + Math.random() * 20;
                const delay = Math.random() * 15;
                element.style.animation = `floatAround ${duration}s infinite ease-in-out`;
                element.style.animationDelay = `${delay}s`;
                element.style.opacity = 0.6 + Math.random() * 0.3;

                container.appendChild(element);
            }

            // Adiciona alguns elementos extras para garantir variedade (opcional)
            for (let i = 0; i < 10; i++) {
                const extra = document.createElement('div');
                extra.className = 'flower';
                extra.textContent = flowerEmojis[Math.floor(Math.random() * flowerEmojis.length)];
                extra.style.fontSize = `${1.2 + Math.random() * 1.8}rem`;
                extra.style.left = `${Math.random() * 100}%`;
                extra.style.top = `${Math.random() * 100}%`;
                extra.style.animation = `floatAround ${15 + Math.random() * 25}s infinite alternate`;
                extra.style.animationDelay = `${Math.random() * 10}s`;
                extra.style.opacity = 0.5;
                container.appendChild(extra);
            }
        }

        // ========== FOGOS DE ARTIFÍCIO ==========
        class Fireworks {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.particles = [];
                this.resize();
                window.addEventListener('resize', () => this.resize());
                this.animate();
            }
            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }
            createExplosion(x, y) {
                const colors = ['#ff4d6d', '#ffb3c6', '#ff6d8a', '#ff99bb', '#ffd966', '#ffc2d4', '#ff8787'];
                for (let i = 0; i < 65; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 2 + Math.random() * 6;
                    const vx = Math.cos(angle) * speed;
                    const vy = Math.sin(angle) * speed;
                    this.particles.push({
                        x: x, y: y, vx: vx, vy: vy,
                        life: 1, maxLife: 0.9 + Math.random() * 0.8,
                        color: colors[Math.floor(Math.random() * colors.length)],
                        size: 3 + Math.random() * 5
                    });
                }
            }
            randomFire() {
                const x = Math.random() * this.canvas.width;
                const y = Math.random() * this.canvas.height * 0.7 + 30;
                this.createExplosion(x, y);
            }
            update() {
                for (let i = 0; i < this.particles.length; i++) {
                    const p = this.particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= 0.015;
                    if (p.life <= 0 || p.y > this.canvas.height + 50 || p.x < -50 || p.x > this.canvas.width + 50) {
                        this.particles.splice(i, 1);
                        i--;
                    }
                }
            }
            draw() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                for (let p of this.particles) {
                    this.ctx.globalAlpha = p.life * 0.8;
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                    this.ctx.fillStyle = p.color;
                    this.ctx.fill();
                }
                this.ctx.globalAlpha = 1;
            }
            animate() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.animate());
            }
            startFireInterval() {
                if (this.fireInterval) clearInterval(this.fireInterval);
                this.fireInterval = setInterval(() => {
                    for (let i = 0; i < 3; i++) this.randomFire();
                }, 700);
            }
            stopFireInterval() {
                if (this.fireInterval) clearInterval(this.fireInterval);
            }
        }

        let fireworkSys = null;

        // ========== RENDERIZAÇÃO DAS PÁGINAS ==========
        function renderPage() {
            const root = document.getElementById('app-root');
            if (!root) return;

            if (rejectedFlag) {
                const page = PAGES.rejected;
                root.innerHTML = `
                <div class="card">
                    <h2>${page.title}</h2>
                    <div class="romantic-phrase">${page.phrase}</div>
                    <div class="password-area">
                        <button id="restartBtn">🌹 Recomeçar Jornada 🌹</button>
                    </div>
                </div>
            `;
                document.getElementById('restartBtn')?.addEventListener('click', () => {
                    rejectedFlag = false;
                    currentPage = 1;
                    renderPage();
                });
                return;
            }

            if (currentPage === 6) {
                const page = PAGES[6];
                root.innerHTML = `
                <div class="card">
                    <h2>${page.title}</h2>
                    <div class="romantic-phrase">${page.phrase}</div>
                    <div class="password-area">
                        <p style="font-size:1.4rem;">🎉💍 Você disse SIM! Nosso amor é infinito 💍🎉</p>
                        <button id="celebrateAgain">✨ Recomeçar Jornada ✨</button>
                    </div>
                </div>
            `;
                document.getElementById('celebrateAgain')?.addEventListener('click', () => {
                    resetAll();
                });
                return;
            }

            if (currentPage === 5) {
                const proposalPage = PAGES[5];
                root.innerHTML = `
                <div class="card">
                    <h2>💖 ${proposalPage.title} 💖</h2>
                    <div class="romantic-phrase">${proposalPage.phrase}</div>
                    <div class="password-area">
                        <p style="font-size:1.7rem; font-weight:bold;">💍 Aceita namorar comigo? 💍</p>
                        <div class="choice-buttons">
                            <button id="simBtn">💘 SIM 💘</button>
                            <button id="naoBtn" class="no-btn">💔 NÃO 💔</button>
                        </div>
                    </div>
                </div>
            `;
                document.getElementById('simBtn')?.addEventListener('click', () => {
                    currentPage = 6;
                    renderPage();
                    if (fireworkSys) fireworkSys.startFireInterval();
                });
                document.getElementById('naoBtn')?.addEventListener('click', () => {
                    rejectedFlag = true;
                    if (fireworkSys) fireworkSys.stopFireInterval();
                    renderPage();
                });
                return;
            }

            const pageData = PAGES[currentPage];
            if (!pageData) return;

            let inputHtml = '';
            if (pageData.isNumericCode) {
                inputHtml = `
                <div class="digit-group">
                    <input type="text" maxlength="1" class="digit" id="d1" placeholder="•">
                    <input type="text" maxlength="1" class="digit" id="d2" placeholder="•">
                    <input type="text" maxlength="1" class="digit" id="d3" placeholder="•">
                    <input type="text" maxlength="1" class="digit" id="d4" placeholder="•">
                </div>
                <button id="submitPassword">🔓 Desbloquear 🔓</button>
                <div id="errorMsg" class="error-msg"></div>
            `;
            } else {
                inputHtml = `
                <input type="text" id="passwordInput" placeholder="${pageData.placeholder}" autocomplete="off">
                <button id="submitPassword">🌠 Revelar Próxima Página 🌠</button>
                <div id="errorMsg" class="error-msg"></div>
                <small style="display:block; margin-top:8px;">💡 Dica: ${pageData.hint}</small>
            `;
            }

            root.innerHTML = `
            <div class="card">
                <h2>${pageData.title}</h2>
                <div class="romantic-phrase">${pageData.phrase}</div>
                <div class="password-area">
                    ${inputHtml}
                </div>
            </div>
        `;

            if (pageData.isNumericCode) {
                const digits = ['d1', 'd2', 'd3', 'd4'];
                digits.forEach(id => {
                    const inp = document.getElementById(id);
                    if (inp) {
                        inp.addEventListener('input', (e) => {
                            if (inp.value.length === 1) {
                                const next = digits[digits.indexOf(id) + 1];
                                if (next) document.getElementById(next)?.focus();
                            }
                        });
                    }
                });
                const submitBtn = document.getElementById('submitPassword');
                submitBtn?.addEventListener('click', () => {
                    let code = '';
                    for (let d of digits) {
                        const val = document.getElementById(d)?.value || '';
                        if (val.match(/[0-9]/)) code += val;
                        else { code = ''; break; }
                    }
                    if (code.length === 4 && pageData.senhaVerifier(code)) {
                        currentPage++;
                        renderPage();
                        if (fireworkSys) fireworkSys.startFireInterval();
                    } else {
                        const errDiv = document.getElementById('errorMsg');
                        errDiv.innerText = '❌ Cadeado incorreto! Tente novamente. ❌';
                        setTimeout(() => { if (errDiv) errDiv.innerText = ''; }, 1800);
                    }
                });
            } else {
                const submitBtn = document.getElementById('submitPassword');
                const inputField = document.getElementById('passwordInput');
                submitBtn?.addEventListener('click', () => {
                    const val = inputField?.value.trim() || '';
                    if (pageData.senhaVerifier(val)) {
                        currentPage++;
                        renderPage();
                        if (fireworkSys) fireworkSys.startFireInterval();
                    } else {
                        const errDiv = document.getElementById('errorMsg');
                        errDiv.innerText = `💔 Senha errada! ${pageData.hint}`;
                        setTimeout(() => { if (errDiv) errDiv.innerText = ''; }, 1800);
                    }
                });
                if (inputField) inputField.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') submitBtn.click();
                });
            }
        }

        function resetAll() {
            rejectedFlag = false;
            currentPage = 1;
            renderPage();
            if (fireworkSys) {
                fireworkSys.stopFireInterval();
                fireworkSys.startFireInterval();
            }
            generateFloatingElements();
        }

        function init() {
            const canvas = document.getElementById('fireworks-canvas');
            fireworkSys = new Fireworks(canvas);
            fireworkSys.startFireInterval();
            generateFloatingElements();
            renderPage();

            // Adiciona novas flores periodicamente para manter o ambiente vivo
            setInterval(() => {
                if (!rejectedFlag && currentPage !== 6) {
                    const container = document.getElementById('floating-elements');
                    if (container && container.children.length < 70) {
                        const newFlower = document.createElement('div');
                        newFlower.className = 'flower';
                        newFlower.textContent = flowerEmojis[Math.floor(Math.random() * flowerEmojis.length)];
                        newFlower.style.fontSize = `${1.5 + Math.random() * 1.8}rem`;
                        newFlower.style.left = `${Math.random() * 100}%`;
                        newFlower.style.top = `-5%`;
                        newFlower.style.animation = `floatAround ${12 + Math.random() * 15}s linear forwards`;
                        newFlower.style.opacity = '0.7';
                        container.appendChild(newFlower);
                        setTimeout(() => newFlower.remove(), 20000);
                    }
                }
            }, 5000);
        }

        window.addEventListener('load', init);
    </script>
</body>

</html>
